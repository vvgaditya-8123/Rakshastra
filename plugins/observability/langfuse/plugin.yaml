name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Rakshastra — traces conversations, LLM calls, and tool usage. Opt-in via `rakshastra plugins enable observability/langfuse` or `rakshastra tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - RAKSHASTRA_LANGFUSE_PUBLIC_KEY
  - RAKSHASTRA_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
